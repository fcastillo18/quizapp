databaseChangeLog:
  - changeSet:
      id: 1.0-create-users-table
      author: fcastillo
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 1.0-create-quizzes-table
      author: fcastillo
      changes:
        - createTable:
            tableName: quizzes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

  - changeSet:
      id: 1.0-create-questions-table
      author: fcastillo
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: quiz_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_questions_quiz
                    references: quizzes(id)
              - column:
                  name: text
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: explanation
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: correct_option_id
                  type: UUID

  - changeSet:
      id: 1.0-create-options-table
      author: fcastillo
      changes:
        - createTable:
            tableName: options
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: question_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_options_question
                    references: questions(id)
              - column:
                  name: text
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: INT
                  constraints:
                    nullable: false

  - changeSet:
      id: 1.0-add-correct-option-fk
      author: fcastillo
      changes:
        - addForeignKeyConstraint:
            baseTableName: questions
            baseColumnNames: correct_option_id
            constraintName: fk_questions_correct_option
            referencedTableName: options
            referencedColumnNames: id

  - changeSet:
      id: 1.0-create-attempts-table
      author: fcastillo
      changes:
        - createTable:
            tableName: attempts
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_attempts_user
                    references: users(id)
              - column:
                  name: quiz_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_attempts_quiz
                    references: quizzes(id)
              - column:
                  name: started_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: submitted_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: score
                  type: INT
              - column:
                  name: percentage
                  type: DECIMAL(5,2)

  - changeSet:
      id: 1.0-create-answers-table
      author: fcastillo
      changes:
        - createTable:
            tableName: answers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: attempt_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_answers_attempt
                    references: attempts(id)
              - column:
                  name: question_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_answers_question
                    references: questions(id)
              - column:
                  name: selected_option_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_answers_option
                    references: options(id)
              - column:
                  name: correct
                  type: BOOLEAN
                  constraints:
                    nullable: false

  - changeSet:
      id: 1.0-create-notifications-table
      author: fcastillo
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: attempt_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notifications_attempt
                    references: attempts(id)
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
