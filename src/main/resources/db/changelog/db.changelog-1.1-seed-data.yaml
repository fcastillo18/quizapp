              - column:
                  name: text
                  value: "Which training technique is used to align LLMs with human preferences?"
              - column:
                  name: explanation
                  value: "RLHF (Reinforcement Learning from Human Feedback) is widely used to align LLM behavior with human intent."
              - column:
                  name: position
