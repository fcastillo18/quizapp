              - column:
                  name: text
                  value: "What is a token in the context of LLMs?"
              - column:
                  name: explanation
                  value: "A token is the basic unit of text that an LLM processes — it can be a word, subword, or character depending on the tokenizer."
              - column:
                  name: position
                  valueNumeric: 4
        - insert:
            tableName: questions
            columns:
