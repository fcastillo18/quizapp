              - column:
                  name: text
                  value: "Which pattern involves an LLM that reviews and refines another LLM's output?"
              - column:
                  name: explanation
                  value: "The Reflection pattern uses a critic model (or self-critique) to evaluate and improve a draft produced by a generator model."
              - column:
                  name: position
                  valueNumeric: 3
