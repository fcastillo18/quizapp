              - column:
                  name: text
                  value: "Which of the following best describes 'temperature' in LLM inference?"
              - column:
                  name: explanation
                  value: "Temperature controls the randomness of the model's output. Higher values produce more creative/varied outputs; lower values produce more deterministic ones."
              - column:
                  name: position
                  valueNumeric: 5

